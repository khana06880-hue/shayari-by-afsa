<!DOCTYPE html>
<html>
<head>
<title>Ultra Pro Shayari Machine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
padding:30px;
transition:0.5s;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.dark{
background:#111 !important;
color:white;
}

select,button,input{
padding:10px;
margin:8px;
font-size:15px;
border:none;
border-radius:6px;
}

button{
background:#ff4b2b;
color:white;
cursor:pointer;
}

.shayari{
margin-top:25px;
font-size:20px;
background:rgba(0,0,0,0.3);
padding:20px;
border-radius:10px;
min-height:120px;
white-space:pre-line;
}

</style>
</head>
<body>

<h1>🔥 Ultra Pro Shayari Machine</h1>

<select id="mood">
<option value="love">Love ❤️</option>
<option value="sad">Sad 💔</option>
<option value="attitude">Attitude 😎</option>
</select>

<br>

<button onclick="generate()">Generate</button>
<button onclick="toggleMusic()">🎵 Music</button>
<button onclick="saveFav()">💾 Save</button>
<button onclick="share()">📲 Share</button>
<button onclick="toggleMode()">🌙 Dark/Light</button>

<br>

<label>Volume</label>
<input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume(this.value)">

<div class="shayari" id="text"></div>

<audio id="music" src="music.mp3" loop></audio>

<script>

const backgrounds=[
"linear-gradient(135deg,#667eea,#764ba2)",
"linear-gradient(135deg,#ff416c,#ff4b2b)",
"linear-gradient(135deg,#11998e,#38ef7d)",
"linear-gradient(135deg,#fc466b,#3f5efb)"
];

const db={
love:[
`तेरी मुस्कान में जादू है,
तेरी बातों में सुकून है,
तू साथ रहे तो लगता है,
ज़िंदगी का हर लम्हा खूबसूरत है।`,

`मुस्कुराहट देख कर उनकी,
हम होश गवा बैठे,
हम होश में आने को थे,
वो फिर मुस्कुरा बैठे!`,

`तेरे बिना अधूरा हूँ,
तेरे साथ पूरा हूँ,
दुनिया चाहे कुछ भी कहे,
मैं सिर्फ तेरा हूँ।`
],

sad:[
`आँखों में आँसू रुकते नहीं,
दिल के दर्द छुपते नहीं,
वो याद आते रहते हैं,
जो अब मिलते नहीं।`,

`टूट कर भी संभल जाते हैं,
हम खुद को समझा जाते हैं,
दर्द तो अपना साथी है,
हम मुस्कुरा जाते हैं।`
],

attitude:[
`हम वही हैं जो दिल से जीते हैं,
किसी से डर कर नहीं जीते हैं,
नाम सुनकर लोग हट जाते हैं,
हम जहाँ खड़े होते हैं।`,

`हमसे जलने वालों की कमी नहीं,
पर हमें परवाह किसी की नहीं,
अपनी दुनिया के हम बादशाह,
हमसे ऊपर कोई नहीं।`
]
};

let lastIndex=-1;
let autoInterval;

function generate(){
let mood=document.getElementById("mood").value;
let list=db[mood];
let r;
do{
r=Math.floor(Math.random()*list.length);
}while(r===lastIndex);

lastIndex=r;

document.getElementById("text").innerText=list[r];

document.body.style.background=
backgrounds[Math.floor(Math.random()*backgrounds.length)];
}

function toggleMusic(){
let m=document.getElementById("music");
if(m.paused){ m.play(); } else { m.pause(); }
}

function setVolume(v){
document.getElementById("music").volume=v;
}

function saveFav(){
let text=document.getElementById("text").innerText;
localStorage.setItem("favorite",text);
alert("Saved Successfully!");
}

function share(){
let text=document.getElementById("text").innerText;
let url="https://wa.me/?text="+encodeURIComponent(text);
window.open(url,"_blank");
}

function toggleMode(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
